name: Close Stale Issues

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the last 30 days. It will be closed in 7 days if no further
            activity occurs. If this issue is still relevant, please leave a comment
            or remove the `stale` label.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If you believe
            this is still relevant, feel free to reopen it with additional context.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          exempt-issue-labels: bug,security,pinned
          # Only handle issues, not PRs
          days-before-pr-stale: -1
          days-before-pr-close: -1
